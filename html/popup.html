<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InboxAssist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="../css/popup.css" rel="stylesheet" />
</head>
<body>

  <!-- ── App Shell ── -->
  <div class="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-brand">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="1.8"/>
            <path d="M2 8l10 7 10-7" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="brand-name">InboxAssist</span>
      </div>
      <div class="header-meta">
        <span class="status-dot"></span>
        <span class="status-label">Connected</span>
      </div>
    </header>

    <!-- ── Views ── -->
    <main class="app-body">

      <!-- Summarize View -->
      <div class="view active" id="view-summarize">
        <div class="view-inner">
          <div class="view-title-row">
            <h2 class="view-title">Summarize</h2>
            <span class="view-subtitle">Current email thread</span>
          </div>

          

          <div class="option-row">
            <label class="toggle-label">
              <span>Include attachments</span>
              <div class="toggle">
                <input type="checkbox" id="toggle-attachments">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
              </div>
            </label>
          </div>

          <div class="output-area" id="summary-output">
            <div class="output-placeholder">
              <div class="placeholder-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 12h6M9 16h4M17 2H7a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V4a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              </div>
              <p>Summary will appear here</p>
            </div>
          </div>

          <button class="btn-primary" id="btn-summarize">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 4v16M4 12h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Generate Summary
          </button>
        </div>
      </div>

      <!-- Search View -->
      <div class="view" id="view-search">
        <div class="view-inner">
          <div class="view-title-row">
            <h2 class="view-title">Search</h2>
            <span class="view-subtitle">Across all email</span>
          </div>

          <div class="search-bar-wrap">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/><path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <input type="text" class="search-input" id="search-input" placeholder="Find emails about…" />
          </div>

          <div class="filter-row">
            <button class="filter-chip active" data-filter="all">All</button>
            <button class="filter-chip" data-filter="from">From</button>
            <button class="filter-chip" data-filter="subject">Subject</button>
            <button class="filter-chip" data-filter="date">Date</button>
          </div>

          <div class="results-area" id="search-results">
            <div class="output-placeholder">
              <div class="placeholder-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.6"/><path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              </div>
              <p>Type to search your inbox</p>
            </div>
          </div>

          <button class="btn-primary" id="btn-search">
            Search Inbox
          </button>
        </div>
      </div>

      <!-- Compose View -->
      <div class="view" id="view-compose">
        <div class="view-inner">
          <div class="view-title-row">
            <h2 class="view-title">Compose</h2>
            <span class="view-subtitle">AI-assisted drafting</span>
          </div>

          <div class="compose-field-group">
            <label class="field-label" for="compose-to">To</label>
            <input type="text" class="field-input" id="compose-to" placeholder="recipient@example.com" />
          </div>

          <div class="compose-field-group">
            <label class="field-label" for="compose-subject">Subject</label>
            <input type="text" class="field-input" id="compose-subject" placeholder="Email subject" />
          </div>

          <div class="compose-field-group grow">
            <label class="field-label" for="compose-prompt">What should the email say?</label>
            <textarea class="field-input field-textarea" id="compose-prompt" placeholder="Describe the email you want to write…"></textarea>
          </div>

          <div class="tone-row">
            <span class="field-label">Tone</span>
            <div class="tone-chips">
              <button class="filter-chip active" data-tone="professional">Professional</button>
              <button class="filter-chip" data-tone="friendly">Friendly</button>
              <button class="filter-chip" data-tone="concise">Concise</button>
              <button class="filter-chip" data-tone="formal">Formal</button>
            </div>
          </div>

          <button class="btn-primary" id="btn-compose">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Draft Email
          </button>
          <button class="btn-primary btn-send-email" id="btn-send-email" hidden>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Send Email
          </button>
        </div>
      </div>

    </main>

    <!-- ── Bottom Tab Bar ── -->
    <nav class="tab-bar">
      <button class="tab-item active" data-target="view-summarize">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 12h6M9 16h4M17 2H7a2 2 0 00-2 2v16a2 2 0 002 2h10a2 2 0 002-2V4a2 2 0 00-2-2z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <span>Summarize</span>
      </button>
      <button class="tab-item" data-target="view-search">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.7"/>
          <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>
        <span>Search</span>
      </button>
      <button class="tab-item" data-target="view-compose">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Compose</span>
      </button>
    </nav>

  </div>

  <script src="../js/popup.js"></script>
</body>
</html>
