<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inbox Assist</title>
  <link href="../css/popup.css" rel="stylesheet" />
  
  <!-- Swap font out for a better one and readjust weights -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" 
        rel="stylesheet">
</head>

<body>

  <div id="view-main">
    <div class="main">
      <div class="header">
        <!-- Put icon here -->
        <h1>InboxAssist</h1>
      </div>

      <div class="top-options-container">
        <!-- Add SVGs for all buttons -->
        <button class="big-button" id="open-summarize">
          <span>Summarize</span>
        </button>
        <button class="big-button" id="open-search">
          <span>Search</span>
        </button>
        <button class="big-button" id="open-qa">
          <span>Q&amp;A</span>
        </button>
        <button class="big-button" id="open-compose">
          <span>Compose</span>
        </button>
      </div>

      <div class="options">
        <div class="left-options">
          <div class="option-container">
            <div class="option" id="sample_name">
              <div class="boxy-toggle">
                <input type="checkbox" id="sample_name-toggle">
                <label for="sample_name-toggle" class="toggle-ui" aria-label="Toggle Sample option"></label>
              </div>

              <span class="option-name">Sample option</span>
            </div>
          </div>
        </div>

        <div class="right-options">
          <div class="option-container">
            <div class="option" id="test_name">
              <div class="boxy-toggle">
                <input type="checkbox" id="test_name-toggle">
                <label for="test_name-toggle" class="toggle-ui"></label>
              </div>
              <span class="option-name">Right option</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Summarize tab -->
  <div class="tab" id="view-summarize">
    <div class="main">
      <div class="tab-header">
        <h2>Summarize</h2>
        <button class="big-button back-button" id="back-from-summarize">Back</button>
      </div>
    </div>
  </div>

  <!-- Search tab -->
  <div class="tab" id="view-search">
    <div class="main">
      <div class="tab-header">
        <h2>Search</h2>
        <button class="big-button back-button" id="back-from-search">Back</button>
      </div>
    </div>
  </div>

  <!-- Q&A tab -->
  <div class="tab" id="view-qa">
    <div class="main">
      <div class="tab-header">
        <h2>Q&amp;A</h2>
        <button class="big-button back-button" id="back-from-qa">Back</button>
      </div>
    </div>
  </div>

  <!-- Compose tab -->
  <div class="tab" id="view-compose">
    <div class="main">
      <div class="tab-header">
        <h2>Compose</h2>
        <button class="big-button back-button" id="back-from-compose">Back</button>
      </div>
    </div>
  </div>

  <script src="../js/popup.js"></script>

</body>
</html>
